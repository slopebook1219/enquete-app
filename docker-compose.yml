services:
  db:
    image: postgres:16
    container_name: enquete-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: enquete
      POSTGRES_USER: enquete_user
      POSTGRES_PASSWORD: enquete_pass
    ports:
      - "5432:5432"
    volumes:
      - enquete_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enquete_user -d enquete"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: enquete-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: enquete-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  enquete_db_data:
